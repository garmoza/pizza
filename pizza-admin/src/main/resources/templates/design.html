<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<h1>Design pizza</h1>

<form method="POST" th:object="${pizza}">
    <div class="form-item">
        <label for="name">Name of pizza</label><br>
        <input type="text" th:field="*{name}"/>
    </div>

    <div class="form-item">
        <label>Ingredients</label><br>
        <div th:each="ingredient : ${ingredients}">
            <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}">
            <span th:text="${ingredient.name}">INGREDIENT</span><br/>
        </div>
    </div>

    <div class="form-item">
        <label>Type of pizza (size)</label><br>
        <div th:each="size : ${sizes}">
            <input th:field="*{size}" type="checkbox" th:value="${size}">
            <span th:text="${size}">SIZE</span><br/>
        </div>
    </div>

    <div class="form-item">
        <label for="weight">Weight:</label><br>
        <input type="text" th:field="*{weight}"/>
    </div>

    <div class="form-item">
        <label for="price">Price:</label><br>
        <input type="text" th:field="*{price}"/>
    </div>

    <div class="form-item">
        <input type="submit" value="Save new pizza">
    </div>
</form>

</body>
</html>
